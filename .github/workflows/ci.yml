name: CI — Full Production Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.0.0'
  REGISTRY:     ghcr.io
  IMAGE_NAME:   ${{ github.repository }}/api

jobs:
  # ── PHASE 1: Install & cache ──────────────────────────────────
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache/save@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
            ~/.pnpm-store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}

  # ── PHASE 2: Static analysis ──────────────────────────────────
  lint:
    name: Lint (zero warnings)
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: pnpm turbo run lint -- --max-warnings 0

  type-check:
    name: TypeScript strict check
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: pnpm turbo run build --filter=@ai-fashion/shared --filter=@ai-fashion/ai-core
      - run: pnpm turbo run type-check

  dependency-audit:
    name: Dependency security audit
    needs: install
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: pnpm audit --audit-level=high
        continue-on-error: true
      - name: Check for critical CVEs
        run: pnpm audit --audit-level=critical
        continue-on-error: false

  # ── PHASE 3: Tests ────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      GEMINI_API_KEY: test-gemini-key
      OPENAI_API_KEY: sk-test-openai
      CLERK_SECRET_KEY: sk_test_clerk
      CLERK_WEBHOOK_SECRET: whsec_test
      MONGODB_URI: mongodb://localhost:27017
      REPLICATE_API_TOKEN: r8_test
      CLOUDINARY_CLOUD_NAME: test-cloud
      CLOUDINARY_API_KEY: '123456'
      CLOUDINARY_API_SECRET: test-secret
      WEATHER_API_KEY: test-weather-key
      ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: pnpm turbo run build --filter=@ai-fashion/shared --filter=@ai-fashion/ai-core
      - name: Run unit tests with coverage
        run: cd apps/api && npx jest --selectProjects unit --coverage --forceExit
      - uses: codecov/codecov-action@v4
        if: always()
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

  integration-tests:
    name: Integration + chaos tests
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY_TEST }}
      CLERK_WEBHOOK_SECRET: ${{ secrets.CLERK_WEBHOOK_SECRET_TEST }}
      MONGODB_URI: ${{ secrets.MONGODB_URI_TEST }}
      REPLICATE_API_TOKEN: ${{ secrets.REPLICATE_API_TOKEN }}
      CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
      CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
      CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
      WEATHER_API_KEY: ${{ secrets.WEATHER_API_KEY }}
      ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: pnpm turbo run build --filter=@ai-fashion/shared --filter=@ai-fashion/ai-core
      - run: cd apps/api && npx jest tests/integration/ --no-coverage --forceExit
      - run: cd apps/api && npx jest tests/chaos/ --no-coverage --forceExit

  security-tests:
    name: Security test suite
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      GEMINI_API_KEY: test
      OPENAI_API_KEY: sk-test
      CLERK_SECRET_KEY: sk_test_x
      CLERK_WEBHOOK_SECRET: whsec_x
      MONGODB_URI: mongodb://localhost:27017
      REPLICATE_API_TOKEN: r8_test
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: '123'
      CLOUDINARY_API_SECRET: secret
      WEATHER_API_KEY: test
      ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: cd apps/api && npx jest --selectProjects security --no-coverage --forceExit

  ai-validation-tests:
    name: AI anti-hallucination validation
    needs: [lint, type-check]
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      GEMINI_API_KEY: test
      OPENAI_API_KEY: sk-test
      CLERK_SECRET_KEY: sk_test_x
      CLERK_WEBHOOK_SECRET: whsec_x
      MONGODB_URI: mongodb://localhost:27017
      REPLICATE_API_TOKEN: r8_test
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: '123'
      CLOUDINARY_API_SECRET: secret
      WEATHER_API_KEY: test
      ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: pnpm turbo run build --filter=@ai-fashion/shared --filter=@ai-fashion/ai-core
      - run: cd apps/api && npx jest --selectProjects ai-validation --no-coverage --forceExit

  # ── PHASE 4: Build + Docker ───────────────────────────────────
  build:
    name: Production build + Docker
    needs:
      - unit-tests
      - integration-tests
      - security-tests
      - ai-validation-tests
      - dependency-audit
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.push.outputs.digest }}
      image-tag:    ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - name: Build packages
        run: pnpm turbo run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: github.event_name != 'pull_request'
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
      - uses: docker/build-push-action@v5
        id: push
        with:
          context: .
          file:    apps/api/Dockerfile
          push:    ${{ github.event_name != 'pull_request' }}
          tags:    ${{ steps.meta.outputs.tags }}
          labels:  ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_DATE=${{ github.event.head_commit.timestamp }}

  # ── PHASE 5: Load test gate ───────────────────────────────────
  load-test:
    name: Load test (≥95 score gate)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
    env:
      NODE_ENV: test
      PORT: '4001'
      GEMINI_API_KEY: test
      OPENAI_API_KEY: sk-test
      CLERK_SECRET_KEY: sk_test_x
      CLERK_WEBHOOK_SECRET: whsec_x
      MONGODB_URI: mongodb://localhost:27017
      REPLICATE_API_TOKEN: r8_test
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: '123'
      CLOUDINARY_API_SECRET: secret
      WEATHER_API_KEY: test
      ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: pnpm turbo run build --filter=@ai-fashion/shared --filter=@ai-fashion/ai-core --filter=@ai-fashion/api
      - name: Start API + wait
        run: |
          PORT=4001 node apps/api/dist/index.js &
          npx wait-on http://localhost:4001/health --timeout 30000
      - name: Run load test
        run: node scripts/load-test.mjs
      - name: Kill API
        if: always()
        run: pkill -f "node apps/api/dist/index.js" || true

  # ── PHASE 6: Delivery gate ────────────────────────────────────
  delivery-gate:
    name: 50-point delivery checklist
    needs: build
    runs-on: ubuntu-latest
    env:
      NODE_ENV: test
      PORT: '4002'
      GEMINI_API_KEY: test
      OPENAI_API_KEY: sk-test
      CLERK_SECRET_KEY: sk_test_x
      CLERK_WEBHOOK_SECRET: whsec_x
      MONGODB_URI: mongodb://localhost:27017
      REPLICATE_API_TOKEN: r8_test
      CLOUDINARY_CLOUD_NAME: test
      CLOUDINARY_API_KEY: '123'
      CLOUDINARY_API_SECRET: secret
      WEATHER_API_KEY: test
      ALLOWED_ORIGINS: http://localhost:3000
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with: { version: '${{ env.PNPM_VERSION }}' }
      - uses: actions/setup-node@v4
        with: { node-version: '${{ env.NODE_VERSION }}', cache: pnpm }
      - uses: actions/cache/restore@v4
        with:
          path: |
            node_modules
            apps/*/node_modules
            packages/*/node_modules
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
      - run: pnpm turbo run build --filter=@ai-fashion/shared --filter=@ai-fashion/ai-core --filter=@ai-fashion/api
      - name: Start API + health check
        run: |
          PORT=4002 node apps/api/dist/index.js &
          npx wait-on http://localhost:4002/health --timeout 30000
          curl -sf http://localhost:4002/health | jq .
          kill %1
      - name: Run delivery checklist
        run: node scripts/delivery-check.mjs

  # ── PHASE 7: Deploy (main only) ───────────────────────────────
  deploy:
    name: Deploy to production
    needs: [load-test, delivery-gate]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ secrets.PRODUCTION_URL }}
    steps:
      - uses: actions/checkout@v4
      - name: Deploy to Render
        run: |
          curl -s -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_SERVICE_ID }}/deploys" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' | jq .
      - name: Post-deploy smoke test
        run: |
          sleep 30
          curl -sf "${{ secrets.PRODUCTION_URL }}/health" | jq .
      - name: Notify success
        if: success()
        run: |
          echo "✅ Production deploy succeeded: ${{ github.sha }}"
