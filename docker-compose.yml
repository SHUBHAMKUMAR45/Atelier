version: '3.9'

services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: runner
    ports:
      - '4000:4000'
    env_file:
      - apps/api/.env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:4000/health']
    interval: 15s
    timeout: 5s
    retries: 3
    start_period: 30s
    networks:
      - fashion-net
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '1.0'

  mongo:
    image: mongo:7.0
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_DATABASE: ai-fashion-stylist
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
    interval: 15s
    timeout: 5s
    retries: 5
    start_period: 20s
    networks:
      - fashion-net

  # Prometheus (optional observability stack)
  prometheus:
    image: prom/prometheus:latest
    ports:
      - '9090:9090'
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=7d'
    networks:
      - fashion-net
    profiles:
      - observability

  grafana:
    image: grafana/grafana:latest
    ports:
      - '3001:3000'
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    networks:
      - fashion-net
    profiles:
      - observability

volumes:
  mongo-data:
  prometheus-data:
  grafana-data:

networks:
  fashion-net:
    driver: bridge
